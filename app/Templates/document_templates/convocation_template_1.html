<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>Convocatória de Assembleia</title>
    <style>
        @page { margin: 2cm; }
        body {
            font-family: 'Times New Roman', serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .header-logo {
            max-width: 150px;
            max-height: 80px;
            margin-bottom: 10px;
        }
        .header h1 {
            color: #1a1a1a;
            font-size: 22px;
            margin: 0;
        }
        .content {
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .content p {
            margin: 12px 0;
        }
        .content ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .content li {
            margin: 6px 0;
        }
        .footer {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-size: 11px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class='header'>
        {{LOGO_HTML}}
        <h1>Convocatória</h1>
    </div>
    <div class='content'>
        <p><strong>Exm.º(ª) Senhor(a)</strong></p>
        {{CONVOCATION_BODY}}
    </div>
    <div class='footer'>
        <p>Documento gerado em {{GENERATION_DATE}}</p>
    </div>
</body>
</html>
